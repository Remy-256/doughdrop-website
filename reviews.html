<!DOCTYPE html>
<html>
<head>
    <title>Dough Drop & Co. Reviews</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, 'Times New Roman', Times, serif;
            background: url("images/transparentbackground.jpg") center/cover no-repeat;
            min-height: 100vh;
            color: white;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.25);
            z-index: -1;
        }

        /* NAV (UPDATED) */
        nav {
            width: 100%;
            background-color: sienna;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            height: 80px;
        }

        .logo {
            color: white;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
            margin: 0;
            padding: 0;
        }

        nav a {
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* PAGE LAYOUT */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        /* FORM */
        .form {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: sienna;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #8b4513;
        }

        /* REVIEWS */
        .review-card {
            background: white;
            color: black;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .name {
            font-weight: bold;
        }

        .stars {
            color: gold;
            margin: 5px 0;
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .nav-container {
                padding: 10px 15px;
                flex-wrap: wrap;
                height: auto;
            }

            nav ul {
                gap: 10px;
                font-size: 0.85rem;
                flex-wrap: wrap;
            }

            .container {
                padding: 10px;
            }
        }
    </style>
</head>

<body>

<!-- NEW NAVBAR -->
<nav>
    <div class="nav-container">
        <div class="logo">Dough Drop & Co.</div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="palette.html">Palette</a></li>
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="index.html#about">About Us</a></li>
            <li><a href="basket.html">Your Basket</a></li>
        </ul>
    </div>
</nav>

<div class="container">

    <h1>Customer Reviews</h1>

    <div class="form">

        <input id="name" placeholder="Your Name">

        <select id="rating">
            <option value="5">★★★★★</option>
            <option value="4">★★★★☆</option>
            <option value="3">★★★☆☆</option>
            <option value="2">★★☆☆☆</option>
            <option value="1">★☆☆☆☆</option>
        </select>

        <textarea id="reviewText" rows="4" placeholder="Write your review..."></textarea>

        <button onclick="saveReview()">Submit Review</button>
    </div>

    <div id="reviewsContainer"></div>
</div>

<script>
function saveReview() {
    const name = document.getElementById("name").value.trim();
    const rating = parseInt(document.getElementById("rating").value);
    const reviewText = document.getElementById("reviewText").value.trim();

    if (!name || !reviewText) {
        alert("Please fill all fields");
        return;
    }

    let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

    reviews.unshift({
        name,
        rating,
        reviewText,
        createdAt: Date.now()
    });

    localStorage.setItem("reviews", JSON.stringify(reviews));

    document.getElementById("name").value = "";
    document.getElementById("reviewText").value = "";

    loadReviews();
}

function loadReviews() {
    const container = document.getElementById("reviewsContainer");
    container.innerHTML = "";

    let reviews = JSON.parse(localStorage.getItem("reviews")) || [];

    reviews.forEach(r => {
        const fullStars = "★".repeat(r.rating);
        const emptyStars = "☆".repeat(5 - r.rating);

        container.innerHTML += `
            <div class="review-card">
                <div class="name">${r.name}</div>
                <div class="stars">${fullStars}${emptyStars}</div>
                <div>${r.reviewText}</div>
            </div>
        `;
    });
}

loadReviews();
</script>

</body>
</html>
